services:
  dev:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
      - maven-repo:/root/.m2
      - ${HOME}/.docling-cache:/root/.cache
      - ${HOME}/.docling-cache:/root/.local/share/docling
    environment:
      - GOOGLE_API_KEY
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: sleep infinity
    working_dir: /workspace

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  maven-repo:
  ollama-models:
